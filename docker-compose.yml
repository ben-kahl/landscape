x-app-base: &app-base
  build: .
  ports:
    - "8000:8000"
  volumes:
    - ./src:/app/src
    - landscape_auth_data:/var/lib/landscape
  env_file:
    - .env
  environment:
    AUTH_DB_PATH: /var/lib/landscape/auth.db
    MCP_ISSUER_URL: "http://localhost:8000"
  extra_hosts:
    - "host.docker.internal:host-gateway"
  depends_on:
    - neo4j
    - qdrant

services:
  neo4j:
    image: neo4j:2026.03.1
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    environment:
      NEO4J_AUTH: neo4j/landscape-dev
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_db_tx__log_rotation_retention__policy: "100M size"
      NEO4J_db_checkpoint_interval_time: "15m"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama-nvidia:
    profiles: ["gpu-nvidia"]
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      default:
        aliases:
          - ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ollama-amd:
    profiles: ["gpu-amd"]
    image: ollama/ollama:rocm
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
    networks:
      default:
        aliases:
          - ollama

  ollama-cpu:
    profiles: ["cpu"]
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      default:
        aliases:
          - ollama

  app:
    profiles: ["cpu", "gpu-amd", "host"]
    <<: *app-base

  app-gpu:
    profiles: ["gpu-nvidia"]
    <<: *app-base
    networks:
      default:
        aliases:
          - app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  neo4j_data:
  qdrant_storage:
  ollama_models:
  landscape_auth_data:
